<!DOCTY      PE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruleta de Premios</title>

  <!-- 🔥 OPEN GRAPH PARA VISTA PREVIA -->
  <meta property="og:title" content="🎰 Ruleta de Premios | FACU CASINO™">
  <meta property="og:description" content="Girá la rueda y descubrí tu premio.">
  <meta property="og:image" content="https://iili.io/f60i4Rf.md.jpg">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://facucasino.onrender.com">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: url('https://iili.io/KyL5Hba.md.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      text-align: center;
      overflow-x: hidden;
    }

    #logoPrincipal {
      width: 260px;
      margin: 20px auto 15px auto;
      display: block;
      filter: drop-shadow(0 0 12px #ff00ff);
    }

    h1 {
      font-size: 1.8rem;
      margin: 10px 0 20px 0;
      color: #ffcc00;
      text-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff;
      padding: 0 10px;
    }

    .wheel-container {
      position: relative;
      width: 320px;
      margin: 30px auto 0 auto;
    }

    .rgb-ring {
      position: absolute;
      top: -12px;
      left: -12px;
      width: 344px;
      height: 344px;
      border-radius: 50%;
      background: conic-gradient(#ff0000, #ff9900, #ffff00, #00ff00, #00ffff, #0066ff, #9900ff, #ff00ff, #ff0000);
      animation: rgbSpin 4s linear infinite;
      filter: blur(6px) brightness(1.8);
      z-index: -1;
    }

    @keyframes rgbSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #wheelCanvas {
      width: 100%;
      height: auto;
      border-radius: 50%;
    }

    .indicator {
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 25px solid yellow;
      filter: drop-shadow(0 0 5px #ff0);
    }

    #spinButton {
      margin-top: 20px;
      background: #ff0000;
      color: #fff;
      font-size: 1.5rem;
      padding: 15px 40px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
      animation: neonPulse 1.5s infinite alternate;
    }

    #spinButton:disabled {
      background: gray;
      cursor: not-allowed;
      box-shadow: none;
      animation: none;
    }

    @keyframes neonPulse {
      from { box-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
      to   { box-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff; }
    }

    #popup {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #popupContent {
      background: #222;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      max-width: 90%;
      box-shadow: 0 0 20px #ffcc00;
      animation: popupIn 0.5s ease;
    }

    @keyframes popupIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    #popupContent h2 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #00ff99;
    }

    #popupContent p {
      margin: 10px 0;
      font-size: 1.2rem;
    }

    #solicitarBtn {
      margin-top: 15px;
      background: linear-gradient(45deg, #00ccff, #0066ff);
      color: #fff;
      font-size: 1.2rem;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 15px #00ccff;
    }

    #closePopup {
      margin-top: 15px;
      background: #ff3333;
      color: #fff;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    #contactoFacu {
      margin-top: 15px;
      font-size: 1.1rem;
      color: #00ffea;
      text-shadow: 0 0 8px #00ffff;
      font-weight: bold;
    }

    #btnWhatsapp {
      margin-top: 10px;
      background: #25D366;
      color: #fff;
      border: none;
      font-size: 1.2rem;
      padding: 10px 25px;
      border-radius: 50px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 0 12px #25D366;
    }

    #btnWhatsapp img {
      width: 22px;
      height: 22px;
    }

    @media (max-width: 480px) {
      #logoPrincipal {
        width: 200px;
        margin-top: 15px;
      }

      h1 {
        font-size: 1.4rem;
        margin: 5px 0 15px 0;
      }

      .wheel-container {
        width: 250px;
      }

      .rgb-ring {
        width: 270px;
        height: 270px;
        top: -10px;
        left: -10px;
      }

      .indicator {
        top: -30px;
        border-left: 12px solid transparent;
        border-right: 12px solid transparent;
        border-top: 20px solid yellow;
      }

      #spinButton {
        font-size: 1.2rem;
        padding: 12px 30px;
      }

      #popupContent h2 {
        font-size: 1.6rem;
      }

      #popupContent p {
        font-size: 1rem;
      }

      #solicitarBtn,
      #closePopup,
      #btnWhatsapp {
        font-size: 1rem;
        padding: 10px 18px;
      }
    }
  </style>
</head>

<body>

  <img id="logoPrincipal" src="https://iili.io/KyPwhml.md.png" alt="Logo">

  <h1>🎉Girá la rueda y descubrí tu premio🎁</h1>

  <div class="wheel-container">
    <div class="rgb-ring"></div>
    <div class="indicator"></div>
    <canvas id="wheelCanvas" width="300" height="300"></canvas>
  </div>

  <button id="spinButton">GIRAR</button>

  <div id="popup">
    <div id="popupContent">
      <h2>¡GANASTE! 🎉</h2>

      <p id="premioTexto"></p>
      <p id="extraTexto"></p>

      <button id="solicitarBtn">Solicitar premio</button>
      <br>
      <button id="closePopup">Cerrar</button>

      <p id="contactoFacu">📞 Contacto:1125127839 (Facu)</p>

      <button id="btnWhatsapp">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
        Contactar por WhatsApp
      </button>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    const premios = [
      "10% extra (en mi primera carga)",
      "15% extra (en mi primera carga)",
      "400 fichas (en mi primera carga)",
      "300 fichas (sin carga, no retirables)",
      "500 fichas (en mi primera carga)",
      "10% extra (en mi primera carga)",
      "300 fichas (sin carga, no retirables)"
    ];

    let lastSpinTime = localStorage.getItem("lastSpinTime");

    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");

    const spinButton = document.getElementById("spinButton");
    const popup = document.getElementById("popup");
    const premioTexto = document.getElementById("premioTexto");
    const extraTexto = document.getElementById("extraTexto");
    const solicitarBtn = document.getElementById("solicitarBtn");
    const closePopup = document.getElementById("closePopup");
    const btnWhatsapp = document.getElementById("btnWhatsapp");

    const sonidoGiro = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_15b88e99ff.mp3?filename=wheel-spin-1-110166.mp3");
    const sonidoDing = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_5646dd24c8.mp3?filename=ding-126626.mp3");

    const numSegments = premios.length;
    const anglePerSegment = (2 * Math.PI) / numSegments;
    const segmentDeg = 360 / numSegments;
    let currentAngle = 0;

    // === Mapa de premios -> índices de segmentos (por si un texto se repite en la rueda) ===
    const premioToIndexes = premios.reduce((acc, p, idx) => {
      (acc[p] ||= []).push(idx);
      return acc;
    }, {});

    // === Bolsa (shuffle-bag) de premios ÚNICOS para evitar repeticiones seguidas ===
    const BAG_KEY = "premiosBagState_v1";

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function loadBagState() {
      try {
        const raw = localStorage.getItem(BAG_KEY);
        if (!raw) return { bag: [], lastPrize: null };
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.bag)) return { bag: [], lastPrize: null };
        return { bag: parsed.bag, lastPrize: parsed.lastPrize ?? null };
      } catch {
        return { bag: [], lastPrize: null };
      }
    }

    function saveBagState(state) {
      localStorage.setItem(BAG_KEY, JSON.stringify(state));
    }

    function refillBagIfNeeded(state) {
      if (state.bag.length > 0) return;
      const uniques = Array.from(new Set(premios)); // premios únicos
      state.bag = shuffleArray([...uniques]);
    }

    function pickNonRepeatingPrize() {
      const state = loadBagState();
      refillBagIfNeeded(state);

      let prize = state.bag.pop();

      // Anti “repetición inmediata” por si justo se dio al recargar la bolsa
      if (prize === state.lastPrize) {
        refillBagIfNeeded(state);
        if (state.bag.length > 0) {
          // Tomo otro y vuelvo a meter el repetido
          const alt = state.bag.pop();
          state.bag.unshift(prize);
          prize = alt;
        }
      }

      state.lastPrize = prize;
      saveBagState(state);
      return prize;
    }

    function drawWheel() {
      const colors = ["#ff0000","#ff9900","#ffff00","#00ff00","#00ccff","#0066ff","#9900ff"];
      for (let i = 0; i < numSegments; i++) {
        ctx.beginPath();
        ctx.moveTo(150,150);
        ctx.arc(150,150,150,i*anglePerSegment,(i+1)*anglePerSegment);
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        ctx.stroke();
      }
    }
    drawWheel();

    function getRemainingTime() {
      if (!lastSpinTime) return 0;
      const diff = Date.now() - parseInt(lastSpinTime);
      return 24*60*60*1000 - diff;
    }

    function showPopup(premio, countdownText = null) {

      if (!countdownText) {
        confetti({
          particleCount: 200,
          spread: 80,
          origin: { y: 0.6 }
        });
      }

      premioTexto.innerText = countdownText ? countdownText : `FELICIDADES 🎉 Ganaste: ${premio}`;
      extraTexto.innerText = countdownText ? "" : "Recordá volver en 24 hs para volver a girar";

      popup.style.display = "flex";
      solicitarBtn.style.display = countdownText ? "none" : "inline-block";

      btnWhatsapp.onclick = () => {
        const url = `https://wa.me/541125127839`;
        window.open(url, "_blank");
      };

      if (!countdownText) {
        solicitarBtn.onclick = () => {
          const fecha = new Date().toLocaleString();
          const mensaje = `Hola, Facu. Gané en la rueda de premios: ${premio} (${fecha}) y quisiera solicitarlo. Gracias!`;
          const url = `https://wa.me/541125127839?text=${encodeURIComponent(mensaje)}`;
          window.open(url, "_blank");
        };
      }
    }

    function spinWheel() {
      let remaining = getRemainingTime();
      if (remaining > 0) {
        const horas = Math.floor(remaining / (1000*60*60));
        const mins = Math.floor((remaining % (1000*60*60)) / (1000*60));
        showPopup(null, `⏳ Podrás volver a girar en ${horas}h ${mins}m`);
        return;
      }

      spinButton.disabled = true;
      sonidoGiro.currentTime = 0;
      sonidoGiro.play();

      const spinTime = 4000;
      const startAngle = currentAngle;

      // === NUEVO: premio con variedad (shuffle-bag) ===
      const premioElegido = pickNonRepeatingPrize();

      // Si el texto aparece en varios segmentos, elegimos uno de esos segmentos para “caer ahí”
      const indexes = premioToIndexes[premioElegido] || [0];
      const indexElegido = indexes[Math.floor(Math.random() * indexes.length)];

      const centerDeg = (indexElegido * segmentDeg) + (segmentDeg / 2);
      const jitter = (Math.random() - 0.5) * (segmentDeg * 0.6);
      const desiredDeg = centerDeg + jitter;

      const startMod = ((startAngle % 360) + 360) % 360;
      const delta = (desiredDeg - startMod + 360) % 360;

      const extraSpins = 5 + Math.floor(Math.random() * 3);
      const spinAngle = (extraSpins * 360) + delta;

      const targetAngle = startAngle + spinAngle;
      const startTime = performance.now();

      function animate(time) {
        let elapsed = time - startTime;

        if (elapsed < spinTime) {
          const progress = elapsed / spinTime;
          currentAngle = startAngle + (spinAngle * (1 - Math.pow(1 - progress, 3)));
          drawRotatedWheel(currentAngle);
          requestAnimationFrame(animate);
        } else {
          sonidoGiro.pause();
          sonidoGiro.currentTime = 0;
          sonidoDing.play();

          currentAngle = targetAngle;
          drawRotatedWheel(currentAngle);

          lastSpinTime = Date.now();
          localStorage.setItem("lastSpinTime", lastSpinTime);

          showPopup(premioElegido);
          spinButton.disabled = false;
        }
      }
      requestAnimationFrame(animate);
    }

    function drawRotatedWheel(angle) {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.save();
      ctx.translate(150,150);
      ctx.rotate(angle * Math.PI / 180);
      ctx.translate(-150,-150);
      drawWheel();
      ctx.restore();
    }

    spinButton.addEventListener("click", spinWheel);
    closePopup.addEventListener("click", () => { popup.style.display = "none"; });
  </script>

</body>
</html>
